<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal - Study Timer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="navbar-brand">UCSC Student Portal</div>
        <ul class="navbar-menu">
            <li><a href="index.html">IdeaBoard</a></li>
            <li><a href="gpa-calculator.html">GPA Calculator</a></li>
            <li><a href="study-timer.html">Study Timer</a></li>
            <li><button id="darkModeToggle" class="dark-mode-toggle">🌙</button></li>
        </ul>
    </nav>

    <div class="container">
        <div class="content-wrapper">
            <main class="main-content single-page">
                <!-- Study Timer Section -->
                <section class="timer-section">
                    <h2>⏱️ Study Timer (Pomodoro)</h2>
                    <div class="timer-container">
                        <div class="timer-input-group">
                            <label>Set Timer:</label>
                            <div class="timer-inputs">
                                <div class="input-field">
                                    <input type="number" id="timerMinutes" placeholder="Minutes" min="0" max="99" value="25">
                                    <span>min</span>
                                </div>
                                <div class="input-field">
                                    <input type="number" id="timerSeconds" placeholder="Seconds" min="0" max="59" value="0">
                                    <span>sec</span>
                                </div>
                            </div>
                        </div>
                        <div class="timer-display" id="timerDisplay">25:00</div>
                        <div class="timer-buttons">
                            <button class="start-timer-btn" id="startBtn" onclick="startTimer()">Start</button>
                            <button class="pause-timer-btn" id="pauseBtn" onclick="pauseTimer()" style="display:none;">Pause</button>
                            <button class="reset-timer-btn" onclick="resetTimer()">Reset</button>
                        </div>
                    </div>
                </section>
            </main>

            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="sidebar-section">
                    <h2>Upcoming Events</h2>
                    <ul class="events-list" id="eventsList">
                        <li>No upcoming events</li>
                    </ul>
                    <div class="add-event">
                        <input type="text" id="eventInput" placeholder="Add new event..." required>
                        <button onclick="addEvent()">Add Event</button>
                    </div>
                </div>
            </aside>
        </div>

        <footer class="footer">
            <p>&copy; 2026 Study Portal. Share your brilliant ideas!</p>
        </footer>
    </div>

    <script src="study-timer.js"></script>
</body>
</html>
