<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDEA BOARD</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">💡</div>
            <h1>IDEA BOARD</h1>
            <div class="idea-counter">Total Ideas: <span id="ideaCount">0</span></div>
        </header>
        <main class="main-content">
            <table id="ideasTable">
                <thead>
                    <tr>
                        <th style="width: 20%;">Name</th>
                        <th>Idea</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Ideas will be dynamically added here -->
                </tbody>
            </table>
            <div class="add-idea">
                <h2>Add Your Idea</h2>
                <input type="text" id="nameInput" placeholder="Your Name" required>
                <textarea id="ideaInput" placeholder="Describe your idea..." rows="4" required></textarea>
                <div class="button-group">
                    <button onclick="addIdea()">Add Idea</button>
                    <button class="clear-btn" onclick="clearInputs()">Clear</button>
                </div>
            </div>
        </main>
        <footer class="footer">
            <p>&copy; 2026 Group Idea Board. Share your brilliant ideas!</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
