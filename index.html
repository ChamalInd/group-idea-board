<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDEA BOARD</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5; /* light gray */
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 800px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #1e3a8a; /* dark blue */
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #d1d5db; /* light gray */
        }
        th {
            background-color: #1e3a8a; /* dark blue */
            color: white;
        }
        .add-idea {
            margin-top: 30px;
        }
        .add-idea h2 {
            color: #1e3a8a; /* dark blue */
            margin-bottom: 20px;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #d1d5db; /* light gray */
            border-radius: 5px;
            box-sizing: border-box;
        }
        textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #d1d5db; /* light gray */
            border-radius: 5px;
            box-sizing: border-box;
            resize: vertical;
        }
        button {
            background-color: #1e3a8a; /* dark blue */
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #1e40af; /* slightly lighter blue */
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>IDEA BOARD</h1>
        <table id="ideasTable">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Idea</th>
                </tr>
            </thead>
            <tbody>
                <!-- Ideas will be added here -->
            </tbody>
        </table>
        <div class="add-idea">
            <h2>Add Your Idea</h2>
            <input type="text" id="nameInput" placeholder="Your Name">
            <textarea id="ideaInput" placeholder="Your Idea" rows="4"></textarea>
            <button onclick="addIdea()">Add Idea</button>
        </div>
    </div>

    <script>
        function addIdea() {
            const name = document.getElementById('nameInput').value.trim();
            const idea = document.getElementById('ideaInput').value.trim();
            
            if (name === '' || idea === '') {
                alert('Please fill in both name and idea.');
                return;
            }
            
            const tableBody = document.querySelector('#ideasTable tbody');
            const newRow = tableBody.insertRow();
            const nameCell = newRow.insertCell(0);
            const ideaCell = newRow.insertCell(1);
            
            nameCell.textContent = name;
            ideaCell.textContent = idea;
            
            // Clear the input fields
            document.getElementById('nameInput').value = '';
            document.getElementById('ideaInput').value = '';
        }
    </script>
</body>
</html>
